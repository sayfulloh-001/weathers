<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Weather App — Ob-havo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ===== RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Poppins', Roboto, system-ui, sans-serif;
        }

        /* ===== BODY ===== */
        html,
        body {
            width: 100%;
            height: 100%;
            min-height: 100vh;
            max-height: 100vh;
            overflow: hidden;
            background: linear-gradient(145deg, #dceefb 0%, #a8c8e8 50%, #7bb8e0 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            margin: 0;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 50%, rgba(255, 255, 255, 0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 80%, rgba(135, 206, 250, 0.2) 0%, transparent 50%);
            animation: bgFloat 20s ease-in-out infinite alternate;
            z-index: 0;
        }

        @keyframes bgFloat {
            0% {
                transform: translate(0, 0) rotate(0deg);
            }
            100% {
                transform: translate(30px, -20px) rotate(3deg);
            }
        }

        /* ===== APP ===== */
        .app {
            width: 100%;
            height: 100%;
            max-width: 1200px;
            max-height: 100vh;
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 56px;
            padding: 16px 20px 14px;
            box-shadow: 0 50px 100px rgba(0, 40, 80, 0.25), inset 0 1px 3px rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            z-index: 1;
        }

        /* ===== HEADER ===== */
        .hdr {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: nowrap;
            gap: 8px;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            flex-shrink: 0;
            min-height: 48px;
        }

        .lg {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .lg .icon-wrap {
            background: linear-gradient(145deg, #0a6ba8, #1a8bc8);
            padding: 8px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(10, 107, 168, 0.3);
            color: white;
            font-size: 1.4rem;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lg h1 {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #083a5e, #1a6b9e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
            white-space: nowrap;
        }

        .lg h1 span {
            font-weight: 300;
            background: linear-gradient(135deg, #2a7fb5, #5ba3d0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .act {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        /* ===== MENU ===== */
        .mnu {
            position: relative;
            display: inline-block;
        }

        .mnu-btn {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 5px 12px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.6rem;
            cursor: pointer;
            color: #1f5980;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.3s ease;
            white-space: nowrap;
            backdrop-filter: blur(4px);
        }

        .mnu-btn:hover {
            background: rgba(255, 255, 255, 0.85);
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(10, 107, 168, 0.15);
        }

        .mnu-btn i {
            font-size: 0.5rem;
            transition: transform 0.3s ease;
        }

        .mnu-btn.active i:last-child {
            transform: rotate(180deg);
        }

        .mnu-cnt {
            display: none;
            position: absolute;
            top: calc(100% + 6px);
            right: 0;
            min-width: 140px;
            max-height: 300px;
            overflow-y: auto;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 8px 0;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            z-index: 100;
            animation: menuSlide 0.2s ease;
        }

        @keyframes menuSlide {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .mnu-cnt::-webkit-scrollbar {
            width: 4px;
        }
        .mnu-cnt::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.03);
            border-radius: 10px;
        }
        .mnu-cnt::-webkit-scrollbar-thumb {
            background: rgba(10, 107, 168, 0.3);
            border-radius: 10px;
        }

        .mnu-cnt.show {
            display: block;
        }

        .mnu-cnt button {
            display: block;
            width: 100%;
            padding: 8px 18px;
            border: none;
            background: transparent;
            text-align: left;
            font-size: 0.7rem;
            font-weight: 500;
            color: #083a5e;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .mnu-cnt button:hover {
            background: rgba(10, 107, 168, 0.08);
            color: #0a6ba8;
        }

        .mnu-cnt button.act {
            background: rgba(10, 107, 168, 0.12);
            color: #0a6ba8;
            font-weight: 600;
        }

        .mnu-cnt button i {
            margin-right: 10px;
            width: 18px;
            color: #0a6ba8;
        }

        /* ===== SEARCH ===== */
        .src {
            margin-bottom: 10px;
            flex-shrink: 0;
        }

        .box {
            display: flex;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 60px;
            padding: 4px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 40, 80, 0.06);
            backdrop-filter: blur(4px);
        }

        .box:focus-within {
            box-shadow: 0 8px 30px rgba(10, 107, 168, 0.15);
            border-color: rgba(10, 107, 168, 0.3);
            background: rgba(255, 255, 255, 0.85);
        }

        .box input {
            flex: 1;
            border: none;
            padding: 8px 20px;
            font-size: 0.85rem;
            border-radius: 60px;
            background: transparent;
            outline: none;
            color: #083a5e;
            font-weight: 500;
            min-width: 0;
            height: 36px;
        }

        .box input::placeholder {
            color: #8aadc9;
            font-weight: 400;
            font-size: 0.8rem;
        }

        .box button {
            background: linear-gradient(145deg, #0a6ba8, #1a8bc8);
            border: none;
            padding: 8px 22px;
            border-radius: 50px;
            color: white;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.8rem;
            white-space: nowrap;
            height: 36px;
            box-shadow: 0 4px 15px rgba(10, 107, 168, 0.25);
        }

        .box button:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 25px rgba(10, 107, 168, 0.35);
        }

        .box button:active {
            transform: scale(0.95);
        }

        .box button i {
            font-size: 0.85rem;
        }

        .upd-timer {
            font-size: 0.55rem;
            color: #5a8aaa;
            text-align: right;
            margin-top: 4px;
            padding-right: 10px;
            opacity: 0.8;
            font-weight: 500;
        }

        .upd-timer i {
            margin-right: 5px;
            color: #0a6ba8;
        }

        /* ===== STATUS ===== */
        .sts {
            min-height: 28px;
            margin: 2px 0 6px;
            flex-shrink: 0;
        }

        .msg {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 16px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.6);
            font-weight: 500;
            font-size: 0.7rem;
            color: #083a5e;
            border: 1px solid rgba(255, 255, 255, 0.3);
            min-height: 28px;
            backdrop-filter: blur(4px);
        }

        .msg i {
            font-size: 0.85rem;
        }

        .msg.err {
            color: #b13e3e;
            background: rgba(255, 230, 230, 0.85);
            border-color: #ffcdcd;
        }

        .msg.load i {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        /* ===== WEATHER CARD ===== */
        .wth {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 32px;
            padding: 14px 20px;
            margin-bottom: 10px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 0;
            overflow: hidden;
            position: relative;
        }

        .wth::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: nowrap;
            gap: 8px;
            position: relative;
            z-index: 1;
        }

        .cin {
            flex: 1;
            min-width: 0;
        }

        .cin h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #083a5e;
            letter-spacing: -0.5px;
            line-height: 1.1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .cin .dat {
            color: #4a7fa3;
            font-weight: 400;
            font-size: 0.65rem;
            margin-top: 2px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .cin .dat i {
            color: #0a6ba8;
        }

        .tmp {
            display: flex;
            align-items: baseline;
            gap: 3px;
            flex-shrink: 0;
        }

        .tmp .val {
            font-size: 2.8rem;
            font-weight: 300;
            color: #042a44;
            line-height: 1;
        }

        .tmp .unt {
            font-size: 1.1rem;
            font-weight: 300;
            color: #4a7fa3;
        }

        .ico {
            font-size: 2.4rem;
            color: #0a6ba8;
            background: rgba(255, 255, 255, 0.35);
            padding: 4px 14px;
            border-radius: 50px;
            flex-shrink: 0;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .dsc {
            text-align: right;
            font-size: 0.8rem;
            font-weight: 500;
            color: #1f5980;
            flex-shrink: 0;
            min-width: 60px;
        }

        .dsc small {
            display: block;
            font-weight: 300;
            font-size: 0.6rem;
            color: #5a8aaa;
            margin-top: 2px;
        }

        /* ===== DETAILS ===== */
        .dtl {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 12px;
            position: relative;
            z-index: 1;
        }

        .itm {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(4px);
            padding: 8px 4px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            min-height: 48px;
            justify-content: center;
        }

        .itm:hover {
            background: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }

        .itm i {
            font-size: 1.1rem;
            color: #0a6ba8;
            margin-bottom: 2px;
        }

        .itm .lbl {
            font-size: 0.45rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #5a8aaa;
        }

        .itm .vl {
            font-weight: 600;
            font-size: 0.7rem;
            color: #042a44;
            margin-top: 1px;
        }

        /* ===== FORECAST ===== */
        .frc {
            margin: 2px 0 0;
            flex-shrink: 0;
        }

        .frc h3 {
            font-weight: 500;
            font-size: 0.75rem;
            color: #083a5e;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .frc h3 i {
            color: #0a6ba8;
            font-size: 0.8rem;
        }

        .fg {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
        }

        .fd {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(4px);
            border-radius: 18px;
            padding: 6px 2px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.3s ease;
        }

        .fd:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
        }

        .fd .dn {
            font-weight: 600;
            font-size: 0.5rem;
            color: #3a749b;
        }

        .fd .fi {
            font-size: 1.1rem;
            color: #0a6ba8;
            margin: 2px 0;
        }

        .fd .ft {
            font-weight: 600;
            font-size: 0.65rem;
            color: #042a44;
        }

        .fd .fdsc {
            font-size: 0.4rem;
            color: #5a8aaa;
            margin-top: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ===== FOOTER ===== */
        .ftr {
            margin-top: 8px;
            padding-top: 6px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            justify-content: space-between;
            flex-wrap: nowrap;
            gap: 6px;
            font-size: 0.5rem;
            color: #5a8aaa;
            flex-shrink: 0;
            min-height: 22px;
            align-items: center;
        }

        .ftr i {
            color: #0a6ba8;
            margin: 0 3px;
        }

        .fl {
            display: flex;
            gap: 10px;
            flex-wrap: nowrap;
        }

        /* ===== REAL DATA ===== */
        .real-data {
            font-size: 0.45rem;
            color: #3a749b;
            text-align: center;
            opacity: 0.6;
            margin-top: 4px;
            padding: 3px 10px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            z-index: 1;
        }

        .real-data i {
            color: #0a6ba8;
            margin: 0 2px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            html,
            body {
                padding: 4px;
            }
            .app {
                padding: 10px 12px 8px;
                border-radius: 32px;
            }
            .lg .icon-wrap {
                width: 32px;
                height: 32px;
                font-size: 1rem;
                padding: 6px;
            }
            .lg h1 {
                font-size: 1.1rem;
            }
            .mnu-btn {
                font-size: 0.5rem;
                padding: 4px 8px;
            }
            .mnu-cnt {
                min-width: 110px;
                max-height: 180px;
            }
            .mnu-cnt button {
                font-size: 0.6rem;
                padding: 6px 12px;
            }
            .box input {
                padding: 5px 12px;
                font-size: 0.7rem;
                height: 28px;
            }
            .box button {
                padding: 5px 12px;
                font-size: 0.7rem;
                height: 28px;
            }
            .box button span {
                display: none;
            }
            .msg {
                font-size: 0.55rem;
                padding: 3px 10px;
                min-height: 22px;
            }
            .sts {
                min-height: 22px;
            }
            .wth {
                padding: 10px 12px;
                border-radius: 20px;
            }
            .cin h2 {
                font-size: 1.1rem;
            }
            .cin .dat {
                font-size: 0.55rem;
            }
            .tmp .val {
                font-size: 2rem;
            }
            .tmp .unt {
                font-size: 0.85rem;
            }
            .ico {
                font-size: 1.6rem;
                padding: 3px 10px;
            }
            .dsc {
                font-size: 0.65rem;
                min-width: 45px;
            }
            .dsc small {
                font-size: 0.5rem;
            }
            .dtl {
                gap: 4px;
                margin-top: 8px;
            }
            .itm {
                padding: 5px 2px;
                border-radius: 14px;
                min-height: 36px;
            }
            .itm i {
                font-size: 0.8rem;
            }
            .itm .lbl {
                font-size: 0.4rem;
            }
            .itm .vl {
                font-size: 0.55rem;
            }
            .frc h3 {
                font-size: 0.65rem;
            }
            .fg {
                gap: 4px;
            }
            .fd {
                padding: 4px 2px;
                border-radius: 12px;
            }
            .fd .dn {
                font-size: 0.45rem;
            }
            .fd .fi {
                font-size: 0.85rem;
            }
            .fd .ft {
                font-size: 0.55rem;
            }
            .fd .fdsc {
                font-size: 0.35rem;
            }
            .ftr {
                font-size: 0.4rem;
                min-height: 18px;
            }
            .fl {
                gap: 5px;
            }
            .hdr {
                min-height: 36px;
                margin-bottom: 6px;
            }
            .upd-timer {
                font-size: 0.45rem;
            }
            .real-data {
                font-size: 0.4rem;
                padding: 2px 8px;
            }
        }

        @media (max-width: 360px) {
            .app {
                padding: 6px 8px 6px;
                border-radius: 24px;
            }
            .lg .icon-wrap {
                width: 26px;
                height: 26px;
                font-size: 0.8rem;
                padding: 4px;
                border-radius: 10px;
            }
            .lg h1 {
                font-size: 0.85rem;
            }
            .mnu-btn {
                font-size: 0.4rem;
                padding: 3px 6px;
            }
            .mnu-cnt {
                min-width: 90px;
                max-height: 140px;
            }
            .mnu-cnt button {
                font-size: 0.5rem;
                padding: 4px 10px;
            }
            .box input {
                padding: 4px 8px;
                font-size: 0.6rem;
                height: 22px;
            }
            .box button {
                padding: 4px 8px;
                font-size: 0.6rem;
                height: 22px;
            }
            .box button i {
                font-size: 0.6rem;
            }
            .msg {
                font-size: 0.45rem;
                padding: 2px 8px;
                min-height: 18px;
            }
            .sts {
                min-height: 18px;
            }
            .wth {
                padding: 6px 8px;
                border-radius: 16px;
                margin-bottom: 4px;
            }
            .cin h2 {
                font-size: 0.85rem;
            }
            .cin .dat {
                font-size: 0.45rem;
            }
            .tmp .val {
                font-size: 1.5rem;
            }
            .tmp .unt {
                font-size: 0.7rem;
            }
            .ico {
                font-size: 1.2rem;
                padding: 2px 8px;
            }
            .dsc {
                font-size: 0.5rem;
                min-width: 35px;
            }
            .dsc small {
                font-size: 0.4rem;
            }
            .dtl {
                gap: 3px;
                margin-top: 6px;
            }
            .itm {
                padding: 3px 1px;
                border-radius: 10px;
                min-height: 28px;
            }
            .itm i {
                font-size: 0.6rem;
            }
            .itm .lbl {
                font-size: 0.35rem;
            }
            .itm .vl {
                font-size: 0.45rem;
            }
            .frc h3 {
                font-size: 0.5rem;
            }
            .fg {
                gap: 3px;
            }
            .fd {
                padding: 3px 1px;
                border-radius: 10px;
            }
            .fd .dn {
                font-size: 0.4rem;
            }
            .fd .fi {
                font-size: 0.7rem;
            }
            .fd .ft {
                font-size: 0.45rem;
            }
            .fd .fdsc {
                font-size: 0.3rem;
            }
            .ftr {
                font-size: 0.35rem;
                min-height: 14px;
                margin-top: 4px;
                padding-top: 4px;
            }
            .fl {
                gap: 4px;
            }
            .hdr {
                min-height: 28px;
                margin-bottom: 4px;
            }
            .upd-timer {
                font-size: 0.4rem;
            }
            .real-data {
                font-size: 0.35rem;
                padding: 2px 6px;
            }
        }

        @media (min-width: 481px) and (max-width: 820px) {
            .app {
                padding: 16px 20px 14px;
                border-radius: 40px;
            }
            .lg .icon-wrap {
                width: 44px;
                height: 44px;

            const forecastTitle = $('#forecastTitle');
            const labelHumidity = $('#labelHumidity');
            const labelWind = $('#labelWind');
            const labelPressure = $('#labelPressure');
            const labelVisibility = $('#labelVisibility');
            const updateTimer = $('#updateTimer');
            const realData = $('#realData');

            const langBtn = $('#langBtn');
            const langContent = $('#langContent');
            const langLabel = $('#langLabel');
            const unitBtn = $('#unitBtn');
            const unitContent = $('#unitContent');
            const unitLabel = $('#unitLabel');
            const cityBtn = $('#cityBtn');
            const cityContent = $('#cityContent');
            const cityLabel = $('#cityLabel');

            // ===== STATE =====
            let unit = 'metric';
            let lang = 'uz';
            let lastCity = 'Tashkent';
            let countdownInterval = null;
            let secondsLeft = 300;

            // ===== TRANSLATIONS =====
            const tr = {
                uz: {
                    ph: 'Shahar nomi, masalan: Tashkent',
                    btn: 'Qidirish',
                    load: 'Yuklanmoqda...',
                    nf: 'shahri topilmadi',
                    err: 'Xatolik yuz berdi',
                    net: 'Tarmoq xatosi. Qaytadan urinib ko\'ring',
                    upd: 'yangilandi',
                    hum: 'Namlik',
                    win: 'Shamol',
                    pre: 'Bosim',
                    vis: 'Ko\'rinish',
                    feel: 'His',
                    fc: '5 kunlik prognoz',
                    nofc: 'Prognoz mavjud emas',
                    ent: 'Iltimos, shahar nomini kiriting.',
                    cities: 'Shaharlar',
                    updNext: 'Keyingi yangilanish'
                },
                ru: {
                    ph: 'Название города, например: Ташкент',
                    btn: 'Поиск',
                    load: 'Загрузка...',
                    nf: 'не найден',
                    err: 'Произошла ошибка',
                    net: 'Ошибка сети. Попробуйте снова',
                    upd: 'обновлено',
                    hum: 'Влажность',
                    win: 'Ветер',
                    pre: 'Давление',
                    vis: 'Видимость',
                    feel: 'Ощущается',
                    fc: 'Прогноз на 5 дней',
                    nofc: 'Прогноз недоступен',
                    ent: 'Пожалуйста, введите название города.',
                    cities: 'Города',
                    updNext: 'Следующее обновление'
                },
                en: {
                    ph: 'City name, e.g. Tashkent',
                    btn: 'Search',
                    load: 'Loading...',
                    nf: 'city not found',
                    err: 'An error occurred',
                    net: 'Network error. Please try again',
                    upd: 'updated',
                    hum: 'Humidity',
                    win: 'Wind',
                    pre: 'Pressure',
                    vis: 'Visibility',
                    feel: 'Feels like',
                    fc: '5-day forecast',
                    nofc: 'Forecast not available',
                    ent: 'Please enter a city name.',
                    cities: 'Cities',
                    updNext: 'Next update'
                }
            };

            function t(key) {
                return tr[lang]?.[key] || tr.uz[key] || key;
            }

            // ===== UTILS =====
            function uSym() { return unit === 'metric' ? '°C' : '°F'; }

            function wSym() { return unit === 'metric' ? 'm/s' : 'mph'; }

            function vSym() { return unit === 'metric' ? 'km' : 'mi'; }

            function fmt(timestamp) {
                const d = new Date(timestamp * 1000);
                return d.toLocaleDateString(lang === 'uz' ? 'uz-UZ' : lang === 'ru' ? 'ru-RU' : 'en-US', {
                    weekday: 'short',
                    day: 'numeric',
                    month: 'short',
                    year: 'numeric'
                });
            }

            function day(timestamp) {
                const d = new Date(timestamp * 1000);
                return d.toLocaleDateString(lang === 'uz' ? 'uz-UZ' : lang === 'ru' ? 'ru-RU' : 'en-US', { weekday: 'short' });
            }

            function icon(c) {
                const m = {
                    '01d': 'fa-sun',
                    '01n': 'fa-moon',
                    '02d': 'fa-cloud-sun',
                    '02n': 'fa-cloud-moon',
                    '03d': 'fa-cloud',
                    '03n': 'fa-cloud',
                    '04d': 'fa-cloud',
                    '04n': 'fa-cloud',
                    '09d': 'fa-cloud-rain',
                    '09n': 'fa-cloud-rain',
                    '10d': 'fa-cloud-sun-rain',
                    '10n': 'fa-cloud-moon-rain',
                    '11d': 'fa-bolt',
                    '11n': 'fa-bolt',
                    '13d': 'fa-snowflake',
                    '13n': 'fa-snowflake',
                    '50d': 'fa-smog',
                    '50n': 'fa-smog'
                };
                return m[c] || 'fa-cloud';
            }

            // ===== STATUS =====
            function sts(msg, type = 'info') {
                statusArea.innerHTML = '';
                if (!msg) return;
                const d = document.createElement('div');
                d.className = `msg ${type}`;
                if (type === 'load') {
                    d.innerHTML = `<i class="fas fa-spinner"></i> ${msg}`;
                } else if (type === 'err') {
                    d.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${msg}`;
                } else {
                    d.innerHTML = `<i class="fas fa-info-circle"></i> ${msg}`;
                }
                statusArea.appendChild(d);
            }

            function cls() { statusArea.innerHTML = ''; }

            // ===== LOCALSTORAGE =====
            function saveCity(c) { try { localStorage.setItem('w_city', c); } catch (_) {} }

            function getCity() { try { return localStorage.getItem('w_city') || 'Tashkent'; } catch (_) { return 'Tashkent'; } }

            function saveLang(l) { try { localStorage.setItem('w_lang', l); } catch (_) {} }

            function getLang() { try { return localStorage.getItem('w_lang') || 'uz'; } catch (_) { return 'uz'; } }

            function saveUnit(u) { try { localStorage.setItem('w_unit', u); } catch (_) {} }

            function getUnit() { try { return localStorage.getItem('w_unit') || 'metric'; } catch (_) { return 'metric'; } }

            // ===== UPDATE TIMER =====
            function startCountdown() {
                secondsLeft = 300;
                updateTimer.textContent = `${t('updNext')}: 5:00`;
                clearInterval(countdownInterval);
                countdownInterval = setInterval(() => {
                    secondsLeft--;
                    if (secondsLeft <= 0) {
                        secondsLeft = 0;
                        clearInterval(countdownInterval);
                        updateTimer.textContent = `${t('updNext')}: 0:00`;
                        if (lastCity) {
                            fetchW(lastCity, true);
                        }
                    } else {
                        const min = Math.floor(secondsLeft / 60);
                        const sec = secondsLeft % 60;
                        updateTimer.textContent = `${t('updNext')}: ${min}:${sec.toString().padStart(2, '0')}`;
                    }
                }, 1000);
            }

            function resetCountdown() {
                clearInterval(countdownInterval);
                startCountdown();
            }

            // ===== RENDER =====
            function render(d) {
                if (!d) return;
                const m = d.main,
                    w = d.wind,
                    v = d.visibility ? (d.visibility / 1000) : null,
                    we = d.weather[0];

                cityName.textContent = d.name;
                dateText.textContent = fmt(d.dt);
                tempValue.textContent = Math.round(m.temp);
                tempUnit.textContent = uSym();
                weatherIcon.innerHTML = `<i class="fas ${icon(we.icon)}"></i>`;
                weatherDesc.textContent = we.description.charAt(0).toUpperCase() + we.description.slice(1);
                feelsLike.textContent = `🌡️ ${t('feel')}: ${Math.round(m.feels_like)}${uSym()}`;
                humidity.textContent = `${m.humidity}%`;
                windSpeed.textContent = `${Math.round(w.speed)} ${wSym()}`;
                pressure.textContent = `${m.pressure} hPa`;
                visibility.textContent = v !== null ? `${v.toFixed(1)} ${vSym()}` : '--';

                // REAL DATA
                realData.innerHTML = `
                    <i class="fas fa-cloud-sun"></i> 
                    🌡️ ${Math.round(m.temp)}${uSym()} | 
                    💧 ${m.humidity}% | 
                    💨 ${Math.round(w.speed)} ${wSym()} | 
                    📊 ${m.pressure} hPa | 
                    👁️ ${v !== null ? v.toFixed(1) : '--'} ${vSym()}
                `;

                labelHumidity.textContent = t('hum');
                labelWind.textContent = t('win');
                labelPressure.textContent = t('pre');
                labelVisibility.textContent = t('vis');
                cityInput.placeholder = t('ph');
                searchBtn.innerHTML = `<i class="fas fa-search"></i> <span>${t('btn')}</span>`;
                forecastTitle.innerHTML = `<i class="fas fa-calendar-alt"></i> ${t('fc')}`;
            }

            function renderF(d) {
                if (!d || !d.list) {
                    forecastGrid.innerHTML =
                        `<div class="text-center" style="grid-column:1/-1;color:#5a8aaa;font-size:0.7rem;">${t('nofc')}</div>`;
                    return;
                }
                const map = new Map();
                d.list.forEach(item => {
                    const key = new Date(item.dt * 1000).toDateString();
                    if (!map.has(key)) map.set(key, item);
                });
                const days = Array.from(map.values()).slice(0, 5);
                forecastGrid.innerHTML = '';
                if (days.length === 0) {
                    forecastGrid.innerHTML =
                        `<div class="text-center" style="grid-column:1/-1;color:#5a8aaa;font-size:0.7rem;">${t('nofc')}</div>`;
                    return;
                }
                days.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'fd';
                    div.innerHTML = `
                        <div class="dn">${day(item.dt)}</div>
                        <div class="fi"><i class="fas ${icon(item.weather[0].icon)}"></i></div>
                        <div class="ft">${Math.round(item.main.temp)}${uSym()}</div>
                        <div class="fdsc">${item.weather[0].description}</div>
                    `;
                    forecastGrid.appendChild(div);
                });
            }

            // ===== FETCH =====
            async function fetchW(city, auto = false) {
                if (!city || city.trim() === '') {
                    sts(t('ent'), 'err');
                    return;
                }
                const c = city.trim();
                if (!auto) {
                    cls();
                    sts(t('load'), 'load');
                }

                try {
                    const url = `${WEATHER_URL}?q=${encodeURIComponent(c)}&appid=${API_KEY}&units=${unit}&lang=${lang}`;
                    console.log('📡 REAL API:', url);

                    const wr = await fetch(url);
                    if (!wr.ok) {
                        if (wr.status === 404) sts(`"${c}" ${t('nf')}`, 'err');
                        else sts(`${t('err')} (${wr.status})`, 'err');
                        return;
                    }
                    const wd = await wr.json();
                    console.log('✅ REAL ma\'lumotlar:', wd);

                    const furl = `${FORECAST_URL}?q=${encodeURIComponent(c)}&appid=${API_KEY}&units=${unit}&lang=${lang}`;
                    const fr = await fetch(furl);
                    let fd = null;
                    if (fr.ok) fd = await fr.json();

                    lastCity = c;
                    saveCity(c);
                    render(wd);
                    renderF(fd);
                    if (!auto) {
                        cls();
                        sts(`✅ "${c}" ${t('upd')}`, 'info');
                        setTimeout(cls, 2500);
                    }
                    resetCountdown();
                } catch (e) {
                    console.error('❌ Xatolik:', e);
                    if (!auto) sts(t('net'), 'err');
                }
            }

            // ===== MENU FUNCTIONS =====
            function toggleMenu(content, btn) {
                const isOpen = content.classList.contains('show');
                document.querySelectorAll('.mnu-cnt').forEach(el => el.classList.remove('show'));
                document.querySelectorAll('.mnu-btn').forEach(b => b.classList.remove('active'));
                if (!isOpen) {
                    content.classList.add('show');
                    if (btn) btn.classList.add('active');
                }
            }

            function closeAllMenus() {
                document.querySelectorAll('.mnu-cnt').forEach(el => el.classList.remove('show'));
                document.querySelectorAll('.mnu-btn').forEach(b => b.classList.remove('active'));
            }

            // ===== UNIT & LANG =====
            function setUnit(u) {
                if (u === unit) return;
                unit = u;
                saveUnit(u);
                document.querySelectorAll('#unitContent button').forEach(b => {
                    b.classList.toggle('act', b.dataset.unit === u);
                });
                unitLabel.textContent = u === 'metric' ? '°C' : '°F';
                closeAllMenus();
                if (lastCity) fetchW(lastCity);
            }

            function setLang(l) {
                if (l === lang) return;
                lang = l;
                saveLang(l);
                document.querySelectorAll('#langContent button').forEach(b => {
                    b.classList.toggle('act', b.dataset.lang === l);
                });
                const labels = { uz: "O'zb", ru: 'Рус', en: 'Eng' };
                langLabel.textContent = labels[l] || "O'zb";
                closeAllMenus();

                cityLabel.textContent = t('cities');

                if (lastCity) fetchW(lastCity);
                cityInput.placeholder = t('ph');
                searchBtn.innerHTML = `<i class="fas fa-search"></i> <span>${t('btn')}</span>`;
                forecastTitle.innerHTML = `<i class="fas fa-calendar-alt"></i> ${t('fc')}`;
                labelHumidity.textContent = t('hum');
                labelWind.textContent = t('win');
                labelPressure.textContent = t('pre');
                labelVisibility.textContent = t('vis');
                updateTimer.textContent = `${t('updNext')}: 5:00`;
            }

            // ===== INIT =====
            function init() {
                const sl = getLang();
                lang = sl;
                const su = getUnit();
                unit = su;

                document.querySelectorAll('#langContent button').forEach(b => {
                    b.classList.toggle('act', b.dataset.lang === sl);
                });
                const labels = { uz: "O'zb", ru: 'Рус', en: 'Eng' };
                langLabel.textContent = labels[sl] || "O'zb";

                document.querySelectorAll('#unitContent button').forEach(b => {
                    b.classList.toggle('act', b.dataset.unit === su);
                });
                unitLabel.textContent = su === 'metric' ? '°C' : '°F';

                cityLabel.textContent = t('cities');

                const last = getCity();
                if (last) { cityInput.value = last;
                    lastCity = last; }

                langBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    toggleMenu(langContent, langBtn);
                });
                langContent.querySelectorAll('button').forEach(b => {
                    b.addEventListener('click', () => setLang(b.dataset.lang));
                });

                unitBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    toggleMenu(unitContent, unitBtn);
                });
                unitContent.querySelectorAll('button').forEach(b => {
                    b.addEventListener('click', () => setUnit(b.dataset.unit));
                });

                cityBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    toggleMenu(cityContent, cityBtn);
                });
                cityContent.querySelectorAll('button').forEach(b => {
                    b.addEventListener('click', () => {
                        const city = b.dataset.city;
                        cityInput.value = city;
                        lastCity = city;
                        fetchW(city);
                        closeAllMenus();
                    });
                });

                document.addEventListener('click', () => closeAllMenus());

                searchBtn.addEventListener('click', () => {
                    const c = cityInput.value.trim();
                    if (c) fetchW(c);
                    else sts(t('ent'), 'err');
                });

                cityInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') searchBtn.click(); });

                fetchW(lastCity);
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

        })();
    </script>

</body>
</html>
